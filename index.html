<!DOCTYPE html>
<html lang="it" data-theme="dark"><!--tema scuro di default-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatBotCaiafa</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  
  <div class="floating-controls">

   
    <button class="ctrl-btn" id="theme-toggle" title="Cambia tema">
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1"  x2="12" y2="3"/>   <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>    <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

    
    <button class="ctrl-btn" id="new-chat-btn" title="Nuova chat">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"/>
        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
    </button>

  </div>

  
  <header class="topbar">
    <div class="topbar-logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">Ector</span>
    </div>
  </header>

  
  <main class="main" id="main">

    
    <div class="welcome-screen" id="welcome-screen">
      <div class="welcome-badge">Powered by Gemini</div>
      <h1 class="welcome-title">Come posso aiutarti?</h1>
      <p class="welcome-subtitle">Fai una domanda, chiedi un testo, un'analisi o solo una chiacchierata.</p>
    </div>

   
    <div class="chat-container" id="chat-container">
      <div class="messages-list" id="messages-list"></div>
    </div>

  </main>


  <div class="input-area">

   
    <div class="attachments-preview" id="attachments-preview"></div>

    <div class="input-wrapper">

 
      <button class="attach-btn" id="attach-btn" title="Aggiungi foto o documento">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5"  y1="12" x2="19" y2="12"/>
        </svg>
      </button>

      
      <input type="file" id="file-input" accept="image/*,.pdf,.txt,.doc,.docx" multiple hidden />

     
      <textarea
        id="user-input"
        class="user-input"
        placeholder="Scrivi un messaggio…"
        rows="1"
        maxlength="4000"
      ></textarea>

  
      <button class="send-btn" id="send-btn" title="Invia" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>

    </div>

    <p class="input-disclaimer">GeminiChat può commettere errori. Verifica le informazioni importanti.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
